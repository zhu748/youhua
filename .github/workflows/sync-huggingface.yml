name: Sync to HuggingFace Space

# Syncs the repo to a HuggingFace Space whenever you push to main.
# Setup:
#   1. Create a HuggingFace Space (Docker SDK)
#   2. Create a HuggingFace access token with "write" permission at
#      https://huggingface.co/settings/tokens
#   3. Add the token as a GitHub secret named `HF_TOKEN`
#   4. Update the HF_USERNAME and HF_SPACE_NAME below to match your Space

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  HF_USERNAME: your-hf-username
  HF_SPACE_NAME: proxylab

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace README.md with the HF Space README (has YAML metadata)
          cp deploy/huggingface/HF_SPACE_README.md README.md

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add HF remote
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME

          # Push to HF (force to overwrite any existing Space content)
          git push -f hf HEAD:main
