name: Sync to HuggingFace Space

# Syncs the repo to a HuggingFace Space whenever you push to main.
#
# Setup (all 3 are required):
#   1. Create a HuggingFace Space (Docker SDK) at https://huggingface.co/new-space
#      - Note your username and space name (e.g. https://huggingface.co/spaces/USER/SPACE)
#   2. Create a HuggingFace access token with "write" permission at
#      https://huggingface.co/settings/tokens
#   3. Add THREE GitHub secrets in your repo Settings → Secrets and variables → Actions:
#        HF_USERNAME    = your HuggingFace username (lowercase)
#        HF_SPACE_NAME  = your Space name (lowercase, e.g. proxylab)
#        HF_TOKEN       = the HuggingFace access token (starts with hf_...)
#
# After setup, this workflow will automatically push to HuggingFace on every push to main.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Validate required secrets
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Checking required GitHub secrets..."
          MISSING=""
          if [ -z "$HF_USERNAME" ]; then MISSING="$MISSING HF_USERNAME"; fi
          if [ -z "$HF_SPACE_NAME" ]; then MISSING="$MISSING HF_SPACE_NAME"; fi
          if [ -z "$HF_TOKEN" ]; then MISSING="$MISSING HF_TOKEN"; fi
          if [ -n "$MISSING" ]; then
            echo ""
            echo "❌ ERROR: Missing required GitHub secrets:$MISSING"
            echo ""
            echo "To fix this:"
            echo "  1. Go to your repo Settings → Secrets and variables → Actions"
            echo "  2. Add the following secrets (Repository level):"
            echo "       HF_USERNAME   = your HuggingFace username (lowercase)"
            echo "       HF_SPACE_NAME = your HuggingFace Space name (lowercase)"
            echo "       HF_TOKEN      = your HuggingFace access token (starts with hf_...)"
            echo ""
            echo "Get your HF token at: https://huggingface.co/settings/tokens"
            echo ""
            exit 1
          fi
          echo "✅ All secrets present (username: $HF_USERNAME, space: $HF_SPACE_NAME)"

      - name: Push to HuggingFace Space
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace README.md with the HF Space README (has YAML front matter required by HF)
          cp deploy/huggingface/HF_SPACE_README.md README.md

          # Configure git author for the replacement commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage and commit the README swap (so HF sees the right metadata)
          git add README.md
          # --allow-empty in case the only change is the README swap (already identical)
          git commit -m "chore: use HF Space README metadata" --allow-empty

          # HuggingFace requires oauth2 as the username for token-based git auth
          # (password-style auth with username:token was deprecated in 2024)
          # See: https://huggingface.co/blog/password-git-deprecation
          git remote add hf https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}

          echo "Pushing to huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}..."
          # Force-push to overwrite any existing Space content
          git push -f hf HEAD:main

          # Clean up the remote to avoid leaking the token in logs on subsequent runs
          git remote remove hf

          echo ""
          echo "✅ Successfully synced to HuggingFace Space"
          echo "View at: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
