name: Build & Push Docker Image to GHCR

# Builds the Docker image on every push to main and publishes it to GitHub Container Registry (GHCR).
# The image is then pulled by HuggingFace Spaces (or any other platform) without needing to rebuild.
#
# Image URL after build: ghcr.io/<owner>/<repo>:latest
# For this repo:        ghcr.io/zhu748/youhua:latest
#
# No configuration needed — GHCR auth is automatic via GITHUB_TOKEN.
# Image visibility defaults to public for public repos (HuggingFace can pull it).

on:
  push:
    branches: [main, master]
    # Only rebuild when these paths change (avoid rebuilding on README-only changes)
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'public/**'
      - 'package.json'
      - 'bun.lock'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'postcss.config.mjs'
      - 'tailwind.config.ts'
      - 'components.json'
      - 'instrumentation.ts'
      - 'Dockerfile'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:  # Allow manual trigger from Actions tab

env:
  REGISTRY: ghcr.io
  # Image name: lowercase owner/repo (GHCR requirement)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Grant permissions to push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Always tag with 'latest'
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with short commit SHA for traceability
            type=sha,format=short
            # Tag with branch name
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build for both linux/amd64 and linux/arm64
          # (HuggingFace uses amd64, but arm64 is useful for Apple Silicon / Raspberry Pi)
          platforms: linux/amd64,linux/arm64

      - name: Summary
        run: |
          echo "### ✅ Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View on GHCR: https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}" >> $GITHUB_STEP_SUMMARY
